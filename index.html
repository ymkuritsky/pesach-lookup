}

}

function renderHits(hits){
  const R=document.getElementById('R'),ST=document.getElementById('ST');
  
  const ouN=hits.filter(e=>e.src==='OU').length;
  const skN=hits.filter(e=>e.src==='SK').length;
  const both=ouN>0&&skN>0;

  const top=hits.slice(0,showLimit);
  const grps={};
  top.forEach(e=>{if(!grps[e.c])grps[e.c]=[];grps[e.c].push(e)});

  const q=document.getElementById('S').value.trim();
  const terms=q.toLowerCase().split(/\s+/).filter(t=>t.length>=2);

  let h='';
  if(both)h+='<div class="banner"><span style="font-size:1.1em">&#128269;</span><span>Found in <b>both</b> OU and STAR-K guides. Source shown for each entry.</span></div>';

  const gk=Object.keys(grps).sort((a,b)=>{
    const aM=terms.some(t=>a.toLowerCase().includes(t));
    const bM=terms.some(t=>b.toLowerCase().includes(t));
    if(aM&&!bM)return -1;if(!aM&&bM)return 1;return a.localeCompare(b);
  });

  gk.forEach(cat=>{
    const items=grps[cat];
    h+='<div class="grp"><div class="gh">'+hl(cat,terms)+'</div>';
    items.forEach(e=>{
      h+='<div class="row"><div class="rt">'+hl(e.p,terms)+'</div><div class="tg">'+srctag(e)+stag(e)+'<span class="t t-p">p.'+e.pg+'</span></div></div>';
    });
    h+='</div>';
  });

  if(hits.length>showLimit){
    h+='<div class="more" onclick="showMore()">Show more ('+(hits.length-showLimit)+' remaining)</div>';
  }

  R.innerHTML=h;
  ST.innerHTML=top.length+' of '+hits.length+' results ('+ouN+' OU, '+skN+' STAR-K)';
}

function run(q){
  const R=document.getElementById('R'),ST=document.getElementById('ST');
  document.getElementById('X').classList.toggle('on',q.length>0);
  if(q.length<2){R.innerHTML=home();ST.innerHTML='';return}
  const terms=q.toLowerCase().split(/\s+/).filter(t=>t.length>=2);

  const hits=[];
  D.forEach(e=>{
    const pl=e.p.toLowerCase(), cl=e.c.toLowerCase();

    // Entry must match: all terms in product text, OR all terms in category name  
    const inProduct=terms.every(t=>pl.includes(t));
    const inCategory=terms.every(t=>cl.includes(t));
    if(!inProduct&&!inCategory)return;

    let sc=0;
    terms.forEach(t=>{
      // Word boundary match in product text = strongest signal
      if(new RegExp('\\b'+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i').test(e.p))sc+=20;
      else if(pl.includes(t))sc+=10;
      if(cl.includes(t))sc+=8;
    });
    // Both product AND category match = very relevant
    if(inProduct&&inCategory)sc+=10;
    // Entry is in a matching category (even if product text doesn't contain term)
    if(inCategory&&!inProduct)sc+=5;
    // Product text match without category = might be incidental
    if(inProduct&&!inCategory)sc+=2;
    // Prefer shorter entries
    if(e.p.length<30)sc+=3;
    else if(e.p.length<50)sc+=1;
    if(e.p.length>120)sc-=5;

    hits.push({...e,sc});
  });

  hits.sort((a,b)=>b.sc-a.sc);
  lastHits=hits;

  if(!hits.length){
    R.innerHTML='<div class="empty"><h3>No results</h3><p style="font-size:.9em">Try a different product or brand name</p></div>';
    ST.innerHTML='';return;
  }

  renderHits(hits);
}

let tm;
document.getElementById('S').addEventListener('input',function(e){clearTimeout(tm);showLimit=40;tm=setTimeout(()=>run(e.target.value.trim()),100)});
</script>
